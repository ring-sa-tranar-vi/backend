name: 'Backend CI/CD'

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: 'ringsatranarvi'
  REGION: 'europe-north2'
  RUN_REGION: 'europe-west3'
  REPO_NAME: 'ringsatranarvi-shared-repo'
  IMAGE_NAME: 'backend-service'
  STAGING_SERVICE_NAME: 'staging-backend-service'
  PROD_SERVICE_NAME: 'prod-backend-service'

jobs:
  build-and-push:
    name: 'Build and Push Docker Image'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build with Gradle
        run: ./gradlew assemble

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Tag Docker Image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-staging:
    name: 'Deploy to Staging'
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: 'staging'
      url: 'https://staging-backend-service-49973934534.europe-west3.run.app'

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run (Staging)
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.STAGING_SERVICE_NAME }}
          region: ${{ env.RUN_REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-production:
    name: 'Deploy to Production'
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: 'prod'
      url: 'https://prod-backend-service-49973934534.europe-west3.run.app'

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run (Production)
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.PROD_SERVICE_NAME }}
          region: ${{ env.RUN_REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
