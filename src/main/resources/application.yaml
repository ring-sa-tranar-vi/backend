spring:
  application:
    name: Ring.2.0

  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:.envlocal[.properties]

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:ring20;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${CLERK_JWT_ISSUER_URI}
  web:
    error:
      include-message: always

server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

supabase:
  url: ${SUPABASE_URL:}
  api-key: ${SUPABASE_API_KEY:}
  bucket-name: ${SUPABASE_BUCKET_NAME:}

gemini:
  api-key: ${GEMINI_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  otlp:
    metrics:
      export:
        enabled: true
        url: ${GRAFANA_OTLP_URL}
        headers:
          Authorization: ${GRAFANA_OTLP_AUTH}
        step: 15s
        resource-attributes:
          "service.name": ${spring.application.name:Ring.2.0}
          "service.namespace": "ringsatranarvi"
          "deployment.environment.name": ${APP_ENVIRONMENT:local}
  metrics:
    tags:
      environment: ${APP_ENVIRONMENT:local}
