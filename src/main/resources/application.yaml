spring:
  application:
    name: Ring.2.0

  profiles:
    active: ${APP_ENVIRONMENT:local}

  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:.envlocal[.properties]

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ring20_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${CLERK_JWT_ISSUER_URI}
  web:
    error:
      include-message: always

server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
gcp:
  storage:
    bucket-name: ${GCP_STORAGE_BUCKET_NAME:}

supabase:
  url: ${SUPABASE_URL:}
  api-key: ${SUPABASE_API_KEY:}
  bucket-name: ${SUPABASE_BUCKET_NAME:}

gemini:
  api-key: ${GEMINI_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  otlp:
    metrics:
      export:
        enabled: true
        url: ${GRAFANA_OTLP_URL}
        headers:
          Authorization: ${GRAFANA_OTLP_AUTH}
        step: 15s
        resource-attributes:
          "service.name": ${spring.application.name:Ring.2.0}
          "service.namespace": "ringsatranarvi"
          "deployment.environment.name": ${APP_ENVIRONMENT:local}
  metrics:
    tags:
      environment: ${APP_ENVIRONMENT:local}
